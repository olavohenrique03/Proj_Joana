<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/header.css">
    
    <link rel="stylesheet" href="../css/footer.css">

    <title>Mamíferos</title>

</head>
<body>
    <!-- Menu de navegação -->
     <header id="header"></header>

    <main>
        <h1 class="specie-name">Mamíferos</h1>

        <!-- Menu de animais -->
        <section class="animais-menu">
            <div class="container">
                <ul class="animais-menu__lista">
                    <li class="animais-menu__item ativo" data-animal="coelho">Coelho</li>
                    <li class="animais-menu__item" data-animal="porquinho">Porquinho</li>
                    <li class="animais-menu__item" data-animal="chinchila">Chinchila</li>
                    <li class="animais-menu__item" data-animal="hamster">Hamster</li>
                    <li class="animais-menu__item" data-animal="twister">Twister</li>
                    <li class="animais-menu__item" data-animal="furão">Furão</li>
                    <li class="animais-menu__item" data-animal="ouriço">Ouriço</li>
                </ul>
            </div>
        </section>

        <!-- Descrição — preenchida pelo JS -->
        <section class="descrição">
            <div class="container">
                <p class="descricao__texto"></p>
            </div>
        </section>

        <!-- Vídeo — preenchido pelo JS -->
        <section class="video-secao">
            <div class="container">
                <video class="video-secao__player" src=""></video>
            </div>
        </section>

        <!-- Materiais e Procedimentos — preenchidos pelo JS -->
        <section class="conteudo">
            <h2 class="conteudo__titulo"></h2>
            <div class="conteudo__colunas">
                <div class="conteudo__materiais"></div>
                <div class="conteudo__procedimentos"></div>
            </div>
        </section>

    </main>

    <!-- Rodapé -->
     <footer id="footer"></footer>

     <!-- JS Bootstrap -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     
     <!-- JS -->
     <script src="../js/script.js"></script>
     <script src="../js/mamiferos.js"></script>
</body>
</html>
